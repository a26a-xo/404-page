
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 Not Found</title>

<style>
body{
    margin:0;
    background:#ffffff;
    color:#333;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.container{
    max-width:700px;
    margin:120px auto;
    padding:0 24px;
}

h1{
    font-size:34px;
    font-weight:500;
    margin-bottom:24px;
    cursor:pointer;
}

p{
    line-height:1.8;
    color:#666;
}

a{
    color:#0066cc;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

hr{
    border:none;
    border-top:1px solid #ddd;
    margin:30px 0;
}

.footer{
    font-size:13px;
    color:#999;
}
</style>
</head>

<body>

<div class="container">

<h1 id="secret">404 Not Found</h1>

<p>お探しのページは見つかりませんでした。</p>

<p>
URLが変更されたか、削除された可能性があります。
</p>

<hr>

<div class="footer">
Error Code: 404
</div>

</div>

<script>
let tap = 0;

document.getElementById("secret").onclick = function(){

    tap++;

    if(tap >= 5){
        window.location.href="https://www.cuddle-jp.com/";
    }

}
</script>

</body>
</html>
